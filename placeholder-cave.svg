<?xml version="1.0" encoding="UTF-8"?>
<!-- UNDER THE STARLIT SKY · cave-slot thumbnail — night + golden grass -->
<svg xmlns="http://www.w3.org/2000/svg" width="260" height="170" viewBox="0 0 260 170" preserveAspectRatio="xMidYMid slice">

    <defs>
        <linearGradient id="cvSky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#0a1b30"/>
            <stop offset="55%"  stop-color="#142d44"/>
            <stop offset="100%" stop-color="#1f3a55"/>
        </linearGradient>
        <linearGradient id="cvFrame" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"  stop-color="#a87838"/>
            <stop offset="60%" stop-color="#d4a058"/>
            <stop offset="100%" stop-color="#e8c068"/>
        </linearGradient>
        <radialGradient id="cvMoon" cx="50%" cy="35%" r="22%">
            <stop offset="0%"   stop-color="#f5e5b8" stop-opacity="0.85"/>
            <stop offset="60%"  stop-color="#d4a058" stop-opacity="0.30"/>
            <stop offset="100%" stop-color="#a87838" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <!-- Sky -->
    <rect width="260" height="170" fill="url(#cvSky)"/>

    <!-- Frame -->
    <rect x="2" y="2" width="256" height="166" fill="none"
          stroke="url(#cvFrame)" stroke-width="1.5" opacity="0.70"/>

    <!-- Moon -->
    <circle cx="130" cy="60" r="28" fill="url(#cvMoon)"/>
    <circle cx="130" cy="60" r="16" fill="#f5e5b8" opacity="0.95"/>

    <!-- Stars -->
    <g fill="#f0e8d0">
        <circle cx="20" cy="16" r="1.2" opacity="0.92"/>
        <circle cx="48" cy="32" r="0.9" opacity="0.80"/>
        <circle cx="86" cy="20" r="1.4" opacity="0.95"/>
        <circle cx="180" cy="22" r="1.2" opacity="0.90"/>
        <circle cx="220" cy="32" r="0.9" opacity="0.80"/>
        <circle cx="240" cy="20" r="1.3" opacity="0.92"/>
        <circle cx="38" cy="52" r="0.8" opacity="0.72"/>
        <circle cx="208" cy="48" r="0.7" opacity="0.68"/>
    </g>

    <!-- Mountain ridge -->
    <path d="M 0 110 L 40 92 L 90 105 L 145 88 L 200 102 L 260 95 L 260 130 L 0 130 Z"
          fill="#0c1f33" opacity="0.92"/>

    <!-- Foreground grass strip -->
    <rect x="0" y="125" width="260" height="45" fill="#8c6428" opacity="0.55"/>

    <!-- Grass blades -->
    <g stroke="#e8c068" stroke-width="1.1" fill="none" opacity="0.80" stroke-linecap="round">
        <line x1="14" y1="160" x2="16" y2="138"/>
        <line x1="38" y1="162" x2="36" y2="140"/>
        <line x1="64" y1="160" x2="66" y2="138"/>
        <line x1="92" y1="162" x2="90" y2="140"/>
        <line x1="120" y1="160" x2="122" y2="138"/>
        <line x1="150" y1="162" x2="148" y2="140"/>
        <line x1="178" y1="160" x2="180" y2="138"/>
        <line x1="208" y1="162" x2="206" y2="140"/>
        <line x1="238" y1="160" x2="240" y2="138"/>
    </g>
</svg>
