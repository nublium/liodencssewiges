<?xml version="1.0" encoding="UTF-8"?>
<!-- UNDER THE STARLIT SKY · pride-overview banner — three lions under stars -->
<svg xmlns="http://www.w3.org/2000/svg" width="260" height="170" viewBox="0 0 260 170" preserveAspectRatio="xMidYMid slice">

    <defs>
        <linearGradient id="prSky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#0a1b30"/>
            <stop offset="60%"  stop-color="#142d44"/>
            <stop offset="100%" stop-color="#1f3a55"/>
        </linearGradient>
        <linearGradient id="prFrame" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"  stop-color="#a87838"/>
            <stop offset="60%" stop-color="#d4a058"/>
            <stop offset="100%" stop-color="#e8c068"/>
        </linearGradient>
        <radialGradient id="prMoon" cx="50%" cy="32%" r="20%">
            <stop offset="0%"   stop-color="#f5e5b8" stop-opacity="0.95"/>
            <stop offset="60%"  stop-color="#d4a058" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#a87838" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="260" height="170" fill="url(#prSky)"/>

    <rect x="2" y="2" width="256" height="166" fill="none"
          stroke="url(#prFrame)" stroke-width="1.5" opacity="0.70"/>

    <!-- Moon -->
    <circle cx="130" cy="55" r="26" fill="url(#prMoon)"/>
    <circle cx="130" cy="55" r="14" fill="#f5e5b8" opacity="0.95"/>

    <!-- Stars -->
    <g fill="#f0e8d0">
        <circle cx="22" cy="20" r="1.1" opacity="0.88"/>
        <circle cx="54" cy="14" r="0.9" opacity="0.78"/>
        <circle cx="78" cy="36" r="1.3" opacity="0.95"/>
        <circle cx="190" cy="28" r="1.1" opacity="0.88"/>
        <circle cx="220" cy="14" r="0.9" opacity="0.78"/>
        <circle cx="240" cy="36" r="1.2" opacity="0.90"/>
        <circle cx="38" cy="56" r="0.7" opacity="0.65"/>
        <circle cx="208" cy="52" r="0.8" opacity="0.72"/>
    </g>

    <!-- Distant ridge -->
    <path d="M 0 110 L 30 95 L 70 105 L 130 90 L 190 102 L 230 95 L 260 100 L 260 130 L 0 130 Z"
          fill="#0c1f33" opacity="0.92"/>

    <!-- Three lion silhouettes in a row -->
    <g fill="#0a1525" opacity="0.92">
        <!-- Left lion -->
        <ellipse cx="68" cy="135" rx="16" ry="8"/>
        <circle cx="54" cy="132" r="6"/>

        <!-- Center king with golden mane -->
        <ellipse cx="130" cy="138" rx="20" ry="9"/>
        <circle cx="113" cy="134" r="7"/>

        <!-- Right lion -->
        <ellipse cx="192" cy="135" rx="16" ry="8"/>
        <circle cx="178" cy="132" r="6"/>
    </g>

    <!-- Golden mane wisps on center king -->
    <g fill="none" stroke-linecap="round" opacity="0.92">
        <path d="M 106 130 Q 96 128, 88 132 Q 82 136, 80 142"
              stroke="#e8c068" stroke-width="2"/>
        <path d="M 108 134 Q 98 138, 90 142"
              stroke="#ffd680" stroke-width="1.5"/>
    </g>

    <!-- Foreground grass -->
    <rect x="0" y="140" width="260" height="30" fill="#8c6428" opacity="0.50"/>

    <g stroke="#d4a058" stroke-width="0.9" fill="none" opacity="0.70" stroke-linecap="round">
        <line x1="22" y1="160" x2="24" y2="148"/>
        <line x1="42" y1="162" x2="40" y2="148"/>
        <line x1="218" y1="160" x2="220" y2="148"/>
        <line x1="238" y1="162" x2="236" y2="148"/>
    </g>
</svg>
