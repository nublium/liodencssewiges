<?xml version="1.0" encoding="UTF-8"?>
<!-- UNDER THE STARLIT SKY · nesting-grounds banner — sleeping cubs under stars -->
<svg xmlns="http://www.w3.org/2000/svg" width="260" height="170" viewBox="0 0 260 170" preserveAspectRatio="xMidYMid slice">

    <defs>
        <linearGradient id="nsSky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#0a1b30"/>
            <stop offset="60%"  stop-color="#142d44"/>
            <stop offset="100%" stop-color="#1f3a55"/>
        </linearGradient>
        <linearGradient id="nsFrame" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"  stop-color="#a87838"/>
            <stop offset="60%" stop-color="#d4a058"/>
            <stop offset="100%" stop-color="#e8c068"/>
        </linearGradient>
        <radialGradient id="nsNest" cx="50%" cy="78%" r="40%">
            <stop offset="0%"   stop-color="#ffd680" stop-opacity="0.40"/>
            <stop offset="60%"  stop-color="#d4a058" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#a87838" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="260" height="170" fill="url(#nsSky)"/>

    <rect x="2" y="2" width="256" height="166" fill="none"
          stroke="url(#nsFrame)" stroke-width="1.5" opacity="0.70"/>

    <!-- Stars -->
    <g fill="#f0e8d0">
        <circle cx="22"  cy="20" r="1.2" opacity="0.92"/>
        <circle cx="58"  cy="32" r="0.9" opacity="0.78"/>
        <circle cx="98"  cy="16" r="1.4" opacity="0.95"/>
        <circle cx="138" cy="30" r="0.9" opacity="0.80"/>
        <circle cx="178" cy="16" r="1.2" opacity="0.90"/>
        <circle cx="218" cy="32" r="0.9" opacity="0.78"/>
        <circle cx="32"  cy="54" r="0.7" opacity="0.65"/>
        <circle cx="208" cy="50" r="0.8" opacity="0.72"/>
    </g>

    <!-- Distant horizon -->
    <path d="M 0 110 Q 80 100, 130 108 Q 200 100, 260 108 L 260 135 L 0 135 Z"
          fill="#0c1f33" opacity="0.92"/>

    <!-- Glow around the nest -->
    <ellipse cx="130" cy="138" rx="100" ry="24" fill="url(#nsNest)"/>

    <!-- The nest — a soft curved cradle -->
    <path d="M 70 145 Q 130 125, 190 145" stroke="#a87838" stroke-width="3"
          fill="none" opacity="0.85"/>
    <path d="M 76 150 Q 130 132, 184 150" stroke="#8c6428" stroke-width="2"
          fill="none" opacity="0.65"/>

    <!-- Cubs / eggs as soft glowing orbs -->
    <g>
        <ellipse cx="100" cy="142" rx="9" ry="7" fill="#3a2818" opacity="0.85"/>
        <ellipse cx="100" cy="140" rx="5" ry="3" fill="#ffd680" opacity="0.55"/>

        <ellipse cx="130" cy="138" rx="10" ry="8" fill="#3a2818" opacity="0.90"/>
        <ellipse cx="130" cy="135" rx="6" ry="3.5" fill="#ffd680" opacity="0.60"/>

        <ellipse cx="160" cy="142" rx="9" ry="7" fill="#3a2818" opacity="0.85"/>
        <ellipse cx="160" cy="140" rx="5" ry="3" fill="#ffd680" opacity="0.55"/>
    </g>

    <!-- Tiny floating sparks -->
    <g fill="#ffd680">
        <circle cx="84"  cy="108" r="1" opacity="0.85"/>
        <circle cx="116" cy="100" r="1.2" opacity="0.90"/>
        <circle cx="148" cy="106" r="1" opacity="0.85"/>
        <circle cx="180" cy="100" r="1.2" opacity="0.90"/>
    </g>

    <!-- Foreground -->
    <rect x="0" y="155" width="260" height="15" fill="#8c6428" opacity="0.50"/>
</svg>
