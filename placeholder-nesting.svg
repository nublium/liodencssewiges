<?xml version="1.0" encoding="UTF-8"?>
<!-- UNDER THE STARLIT SKY · nesting-grounds banner
     LANDSCAPE ONLY · soft valley between hills, no animals -->
<svg xmlns="http://www.w3.org/2000/svg" width="260" height="170" viewBox="0 0 260 170" preserveAspectRatio="xMidYMid slice">

    <defs>
        <linearGradient id="nsSky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#0a1b30"/>
            <stop offset="60%"  stop-color="#142d44"/>
            <stop offset="100%" stop-color="#1f3a55"/>
        </linearGradient>
        <linearGradient id="nsFrame" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"  stop-color="#a87838"/>
            <stop offset="60%" stop-color="#d4a058"/>
            <stop offset="100%" stop-color="#e8c068"/>
        </linearGradient>
        <radialGradient id="nsValley" cx="50%" cy="82%" r="42%">
            <stop offset="0%"   stop-color="#ffd680" stop-opacity="0.50"/>
            <stop offset="60%"  stop-color="#a87838" stop-opacity="0.20"/>
            <stop offset="100%" stop-color="#1a2535" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="260" height="170" fill="url(#nsSky)"/>

    <rect x="2" y="2" width="256" height="166" fill="none"
          stroke="url(#nsFrame)" stroke-width="1.5" opacity="0.70"/>

    <!-- Stars -->
    <g fill="#f0e8d0">
        <circle cx="14"  cy="14" r="1.0" opacity="0.85"/>
        <circle cx="40"  cy="28" r="1.2" opacity="0.92"/>
        <circle cx="66"  cy="12" r="0.9" opacity="0.78"/>
        <circle cx="92"  cy="26" r="1.0" opacity="0.85"/>
        <circle cx="118" cy="14" r="1.3" opacity="0.92"/>
        <circle cx="144" cy="26" r="0.7" opacity="0.70"/>
        <circle cx="172" cy="14" r="1.1" opacity="0.88"/>
        <circle cx="196" cy="28" r="0.9" opacity="0.80"/>
        <circle cx="222" cy="14" r="1.3" opacity="0.92"/>
        <circle cx="248" cy="26" r="0.7" opacity="0.70"/>
        <circle cx="22"  cy="50" r="0.7" opacity="0.65"/>
        <circle cx="74"  cy="56" r="0.9" opacity="0.78"/>
        <circle cx="180" cy="52" r="0.8" opacity="0.72"/>
        <circle cx="232" cy="58" r="0.7" opacity="0.65"/>
    </g>

    <!-- Distant horizon -->
    <path d="M 0 95 L 40 78 L 80 90 L 130 70 L 180 88 L 220 76 L 260 86 L 260 105 L 0 105 Z"
          fill="#0c1f33" opacity="0.92"/>

    <!-- Twin sheltering hills on either side, valley in the middle -->
    <path d="M 0 168 Q 30 110, 80 100 Q 100 100, 110 115 L 110 168 Z"
          fill="#1a2535" opacity="0.95"/>
    <path d="M 260 168 Q 230 110, 180 100 Q 160 100, 150 115 L 150 168 Z"
          fill="#1a2535" opacity="0.95"/>

    <!-- The warm-glow valley between them -->
    <ellipse cx="130" cy="142" rx="60" ry="22" fill="url(#nsValley)"/>

    <!-- Soft mid-ground line -->
    <path d="M 100 138 Q 130 130, 160 138" stroke="#a87838"
          stroke-width="1.5" fill="none" opacity="0.55"/>
    <path d="M 105 144 Q 130 138, 155 144" stroke="#8c6428"
          stroke-width="1" fill="none" opacity="0.40"/>

    <!-- Floating sparks above the valley -->
    <g fill="#ffd680">
        <circle cx="90"  cy="100" r="1.1" opacity="0.88"/>
        <circle cx="118" cy="92"  r="1.4" opacity="0.95"/>
        <circle cx="146" cy="96"  r="1.2" opacity="0.90"/>
        <circle cx="172" cy="100" r="1.0" opacity="0.85"/>
        <circle cx="110" cy="116" r="1.2" opacity="0.90"/>
        <circle cx="150" cy="118" r="1.0" opacity="0.85"/>
        <circle cx="130" cy="124" r="1.3" opacity="0.92"/>
    </g>

    <!-- Foreground -->
    <rect x="0" y="155" width="260" height="15" fill="#8c6428" opacity="0.50"/>
</svg>
