<?xml version="1.0" encoding="UTF-8"?>
<!-- UNDER THE STARLIT SKY · unsorted-lions banner
     LANDSCAPE ONLY · rolling distant dunes / hills, no animals -->
<svg xmlns="http://www.w3.org/2000/svg" width="260" height="170" viewBox="0 0 260 170" preserveAspectRatio="xMidYMid slice">

    <defs>
        <linearGradient id="unSky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#0a1b30"/>
            <stop offset="60%"  stop-color="#142d44"/>
            <stop offset="100%" stop-color="#1f3a55"/>
        </linearGradient>
        <linearGradient id="unFrame" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"  stop-color="#a87838"/>
            <stop offset="60%" stop-color="#d4a058"/>
            <stop offset="100%" stop-color="#e8c068"/>
        </linearGradient>
        <radialGradient id="unGlow" cx="50%" cy="100%" r="60%">
            <stop offset="0%"   stop-color="#e8c068" stop-opacity="0.40"/>
            <stop offset="60%"  stop-color="#a87838" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#0c1f33" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="260" height="170" fill="url(#unSky)"/>

    <rect x="2" y="2" width="256" height="166" fill="none"
          stroke="url(#unFrame)" stroke-width="1.5" opacity="0.70"/>

    <!-- Stars -->
    <g fill="#f0e8d0">
        <circle cx="14"  cy="14" r="1.0" opacity="0.85"/>
        <circle cx="36"  cy="26" r="1.2" opacity="0.92"/>
        <circle cx="60"  cy="12" r="0.9" opacity="0.78"/>
        <circle cx="86"  cy="28" r="1.1" opacity="0.88"/>
        <circle cx="112" cy="14" r="1.4" opacity="0.95"/>
        <circle cx="140" cy="28" r="0.9" opacity="0.80"/>
        <circle cx="166" cy="14" r="1.2" opacity="0.90"/>
        <circle cx="192" cy="26" r="0.8" opacity="0.75"/>
        <circle cx="216" cy="14" r="1.3" opacity="0.92"/>
        <circle cx="240" cy="28" r="0.9" opacity="0.78"/>
        <circle cx="22"  cy="48" r="0.7" opacity="0.65"/>
        <circle cx="58"  cy="56" r="0.8" opacity="0.72"/>
        <circle cx="100" cy="50" r="0.9" opacity="0.78"/>
        <circle cx="148" cy="58" r="0.7" opacity="0.65"/>
        <circle cx="198" cy="50" r="0.8" opacity="0.72"/>
        <circle cx="238" cy="58" r="0.7" opacity="0.65"/>
    </g>

    <!-- Distant mountain ridge — many small peaks (suggesting scattering) -->
    <path d="M 0 85 L 16 70 L 30 78 L 46 65 L 62 76 L 80 64 L 96 78 L 112 68 L 130 80 L 148 70 L 164 80 L 180 68 L 196 78 L 212 70 L 230 80 L 248 72 L 260 80 L 260 100 L 0 100 Z"
          fill="#0c1f33" opacity="0.92"/>

    <!-- Mid hills — rolling dunes -->
    <path d="M 0 110 Q 30 100, 60 110 Q 90 100, 120 110 Q 150 100, 180 110 Q 210 100, 240 110 Q 260 105, 260 110 L 260 130 L 0 130 Z"
          fill="#1a2535" opacity="0.92"/>

    <!-- Closer dunes -->
    <path d="M 0 145 Q 30 132, 70 145 Q 110 132, 150 145 Q 190 132, 230 145 Q 260 140, 260 145 L 260 160 L 0 160 Z"
          fill="#1a2535" opacity="0.85"/>

    <!-- Warm horizon glow -->
    <ellipse cx="130" cy="165" rx="180" ry="22" fill="url(#unGlow)"/>

    <!-- Foreground -->
    <rect x="0" y="148" width="260" height="22" fill="#8c6428" opacity="0.50"/>

    <!-- Small wind sparks suggesting movement / scattering -->
    <g fill="#ffd680">
        <circle cx="40"  cy="120" r="1.0" opacity="0.85"/>
        <circle cx="80"  cy="118" r="0.9" opacity="0.78"/>
        <circle cx="140" cy="122" r="1.2" opacity="0.92"/>
        <circle cx="200" cy="118" r="1.0" opacity="0.85"/>
        <circle cx="60"  cy="140" r="0.9" opacity="0.78"/>
        <circle cx="120" cy="138" r="1.1" opacity="0.88"/>
        <circle cx="180" cy="140" r="1.0" opacity="0.85"/>
        <circle cx="230" cy="138" r="0.9" opacity="0.78"/>
    </g>
</svg>
