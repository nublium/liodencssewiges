<?xml version="1.0" encoding="UTF-8"?>
<!-- UNDER THE STARLIT SKY · Gallery Card 1 — "Mngwa" -->
<svg xmlns="http://www.w3.org/2000/svg" width="260" height="195" viewBox="0 0 260 195" preserveAspectRatio="xMidYMid slice">

    <defs>
        <linearGradient id="c1Sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#0a1b30"/>
            <stop offset="60%"  stop-color="#142d44"/>
            <stop offset="100%" stop-color="#1f3a55"/>
        </linearGradient>
        <radialGradient id="c1Glow" cx="50%" cy="60%" r="50%">
            <stop offset="0%"   stop-color="#ffd680" stop-opacity="0.5"/>
            <stop offset="60%"  stop-color="#d4a058" stop-opacity="0.20"/>
            <stop offset="100%" stop-color="#a87838" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="260" height="195" fill="url(#c1Sky)"/>

    <!-- Stars -->
    <g fill="#f0e8d0">
        <circle cx="22" cy="18" r="1.4" opacity="0.95"/>
        <circle cx="58" cy="32" r="1.0" opacity="0.85"/>
        <circle cx="96" cy="14" r="1.3" opacity="0.90"/>
        <circle cx="138" cy="28" r="0.9" opacity="0.80"/>
        <circle cx="178" cy="16" r="1.5" opacity="0.95"/>
        <circle cx="218" cy="30" r="1.1" opacity="0.85"/>
        <circle cx="244" cy="20" r="0.8" opacity="0.75"/>
        <circle cx="38" cy="56" r="0.9" opacity="0.80"/>
        <circle cx="86" cy="60" r="1.0" opacity="0.85"/>
        <circle cx="158" cy="58" r="1.2" opacity="0.92"/>
        <circle cx="200" cy="70" r="0.8" opacity="0.75"/>
    </g>

    <!-- Distant hills -->
    <path d="M 0 130 L 50 115 L 100 125 L 160 110 L 220 122 L 260 116 L 260 195 L 0 195 Z"
          fill="#0c1f33" opacity="0.9"/>

    <!-- Glow around the mngwa -->
    <ellipse cx="130" cy="135" rx="80" ry="32" fill="url(#c1Glow)"/>

    <!-- Stylized mngwa (mythical lion) — a more majestic, regal silhouette -->
    <g fill="#f5e5b8" opacity="0.90">
        <!-- body -->
        <ellipse cx="130" cy="142" rx="38" ry="13"/>
        <!-- head -->
        <circle cx="105" cy="135" r="12"/>
        <!-- ears -->
        <path d="M 99 126 L 100 121 L 104 125 Z"/>
        <path d="M 109 126 L 112 121 L 113 125 Z"/>
        <!-- legs -->
        <rect x="100" y="150" width="3" height="16" rx="1"/>
        <rect x="110" y="150" width="3" height="16" rx="1"/>
        <rect x="146" y="150" width="3" height="16" rx="1"/>
        <rect x="156" y="150" width="3" height="16" rx="1"/>
        <!-- regal tail with tuft -->
        <path d="M 168 138 Q 184 132, 188 122 L 186 122 Q 178 130, 166 134 Z"/>
        <circle cx="190" cy="118" r="3"/>
    </g>

    <!-- Flowing golden mane -->
    <g fill="none" stroke-linecap="round">
        <path d="M 92 122 Q 78 118, 64 122 Q 54 126, 50 134"
              stroke="#e8c068" stroke-width="3" opacity="0.92"/>
        <path d="M 95 128 Q 80 130, 64 136 Q 52 142, 46 152"
              stroke="#ffd680" stroke-width="2.4" opacity="0.85"/>
        <path d="M 97 134 Q 84 140, 70 146 Q 58 152, 52 162"
              stroke="#d4a058" stroke-width="1.8" opacity="0.70"/>
        <path d="M 110 122 Q 102 116, 94 110"
              stroke="#ffd680" stroke-width="2" opacity="0.78"/>
    </g>

    <!-- Foreground grass -->
    <rect x="0" y="170" width="260" height="25"
          fill="#a87838" opacity="0.55"/>
    <g stroke="#e8c068" stroke-width="1" fill="none" opacity="0.75">
        <line x1="30" y1="188" x2="32" y2="174"/>
        <line x1="68" y1="190" x2="66" y2="176"/>
        <line x1="110" y1="188" x2="112" y2="174"/>
        <line x1="150" y1="190" x2="148" y2="176"/>
        <line x1="190" y1="188" x2="192" y2="174"/>
        <line x1="226" y1="190" x2="224" y2="176"/>
    </g>
</svg>
