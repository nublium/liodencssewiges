<?xml version="1.0" encoding="UTF-8"?>
<!-- UNDER THE STARLIT SKY · King portrait preview (preview-only, ~220x220) -->
<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220" preserveAspectRatio="xMidYMid meet">

    <defs>
        <radialGradient id="kBg" cx="50%" cy="50%" r="55%">
            <stop offset="0%"   stop-color="#1f3a55" stop-opacity="0.0"/>
            <stop offset="100%" stop-color="#0a1b30" stop-opacity="0.0"/>
        </radialGradient>
        <radialGradient id="kManeGold" cx="40%" cy="50%" r="60%">
            <stop offset="0%"   stop-color="#ffd680" stop-opacity="0.95"/>
            <stop offset="60%"  stop-color="#d4a058" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#a87838" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <!-- Transparent backdrop so the body's starlit sky shows through -->
    <rect width="220" height="220" fill="url(#kBg)"/>

    <!-- Golden mane glow halo -->
    <ellipse cx="100" cy="110" rx="90" ry="70" fill="url(#kManeGold)" opacity="0.85"/>

    <!-- Stylized king lion — bigger than the gallery cards -->
    <g fill="#f5e5b8" opacity="0.95">
        <!-- body -->
        <ellipse cx="110" cy="145" rx="55" ry="22"/>
        <!-- head -->
        <circle cx="78" cy="125" r="22"/>
        <!-- ears -->
        <path d="M 64 108 L 66 100 L 73 106 Z"/>
        <path d="M 88 108 L 92 100 L 96 106 Z"/>
        <!-- legs -->
        <rect x="74" y="160" width="5" height="28" rx="2"/>
        <rect x="90" y="160" width="5" height="28" rx="2"/>
        <rect x="128" y="160" width="5" height="28" rx="2"/>
        <rect x="144" y="160" width="5" height="28" rx="2"/>
        <!-- tail -->
        <path d="M 165 138 Q 188 130, 194 116 L 192 116 Q 184 128, 165 134 Z"/>
        <!-- tail tuft -->
        <circle cx="196" cy="112" r="6"/>
    </g>

    <!-- King's eyes -->
    <g fill="#1a1208">
        <circle cx="72" cy="123" r="1.8"/>
        <circle cx="84" cy="123" r="1.8"/>
    </g>

    <!-- Mane wisps streaming back to the right -->
    <g fill="none" stroke-linecap="round">
        <path d="M 56 110 Q 38 106, 22 112 Q 12 118, 6 130"
              stroke="#e8c068" stroke-width="4" opacity="0.95"/>
        <path d="M 60 120 Q 40 124, 22 132 Q 10 140, 4 154"
              stroke="#ffd680" stroke-width="3.2" opacity="0.85"/>
        <path d="M 62 130 Q 44 138, 26 148 Q 14 156, 6 170"
              stroke="#d4a058" stroke-width="2.4" opacity="0.75"/>
        <path d="M 92 102 Q 80 92, 70 84"
              stroke="#ffd680" stroke-width="3" opacity="0.85"/>
        <path d="M 100 100 Q 96 88, 92 78"
              stroke="#e8c068" stroke-width="2.6" opacity="0.85"/>
    </g>

    <!-- Glowing sparks around the king -->
    <g fill="#ffd680">
        <circle cx="36" cy="80" r="1.6" opacity="0.95"/>
        <circle cx="24" cy="100" r="1.2" opacity="0.85"/>
        <circle cx="14" cy="120" r="1.8" opacity="0.95"/>
        <circle cx="20" cy="146" r="1.4" opacity="0.90"/>
        <circle cx="180" cy="90" r="1.3" opacity="0.85"/>
        <circle cx="200" cy="120" r="1.5" opacity="0.90"/>
    </g>
</svg>
