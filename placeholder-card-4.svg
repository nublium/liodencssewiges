<?xml version="1.0" encoding="UTF-8"?>
<!-- UNDER THE STARLIT SKY · Gallery Card 4 — "The Open Wind" -->
<svg xmlns="http://www.w3.org/2000/svg" width="260" height="195" viewBox="0 0 260 195" preserveAspectRatio="xMidYMid slice">

    <defs>
        <linearGradient id="c4Sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#0a1b30"/>
            <stop offset="60%"  stop-color="#142d44"/>
            <stop offset="100%" stop-color="#1f3a55"/>
        </linearGradient>
        <linearGradient id="c4Grass" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#8c6428" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#e8c068" stop-opacity="0.85"/>
        </linearGradient>
    </defs>

    <rect width="260" height="195" fill="url(#c4Sky)"/>

    <!-- Stars -->
    <g fill="#f0e8d0">
        <circle cx="20" cy="20" r="1.3" opacity="0.92"/>
        <circle cx="54" cy="14" r="0.9" opacity="0.78"/>
        <circle cx="88" cy="30" r="1.1" opacity="0.85"/>
        <circle cx="124" cy="16" r="1.4" opacity="0.95"/>
        <circle cx="162" cy="32" r="0.8" opacity="0.70"/>
        <circle cx="198" cy="18" r="1.2" opacity="0.90"/>
        <circle cx="232" cy="34" r="1.0" opacity="0.82"/>
        <circle cx="36" cy="54" r="0.7" opacity="0.65"/>
        <circle cx="106" cy="60" r="0.9" opacity="0.78"/>
        <circle cx="178" cy="56" r="1.1" opacity="0.88"/>
    </g>

    <!-- Distant ridge -->
    <path d="M 0 115 L 40 100 L 90 110 L 140 95 L 200 108 L 260 102 L 260 145 L 0 145 Z"
          fill="#0c1f33" opacity="0.90"/>

    <!-- The wind itself — multiple parallel streaks across the page -->
    <g fill="none" stroke-linecap="round" opacity="0.85">
        <path d="M 0 96 Q 60 92, 130 96 T 260 92"
              stroke="#e8c068" stroke-width="2"/>
        <path d="M 0 110 Q 60 106, 130 110 T 260 106"
              stroke="#ffd680" stroke-width="1.6" opacity="0.85"/>
        <path d="M 20 124 Q 80 120, 150 124 T 260 122"
              stroke="#d4a058" stroke-width="1.4" opacity="0.75"/>
        <path d="M 0 138 Q 60 134, 130 138 T 260 134"
              stroke="#e8c068" stroke-width="1.2" opacity="0.70"/>
    </g>

    <!-- Sparks scattered along the wind -->
    <g fill="#ffd680">
        <circle cx="40"  cy="98"  r="1.6" opacity="0.95"/>
        <circle cx="90"  cy="92"  r="1.2" opacity="0.85"/>
        <circle cx="170" cy="94"  r="1.4" opacity="0.90"/>
        <circle cx="240" cy="92"  r="1.0" opacity="0.78"/>
        <circle cx="60"  cy="112" r="1.2" opacity="0.85"/>
        <circle cx="160" cy="110" r="1.3" opacity="0.90"/>
        <circle cx="230" cy="108" r="1.0" opacity="0.78"/>
        <circle cx="80"  cy="126" r="1.4" opacity="0.92"/>
        <circle cx="190" cy="124" r="1.1" opacity="0.82"/>
    </g>

    <!-- Wind-swept grass field -->
    <rect x="0" y="150" width="260" height="45" fill="url(#c4Grass)"/>

    <!-- Diagonal grass blades all leaning in same wind direction -->
    <g stroke="#a87838" stroke-width="1" fill="none" opacity="0.80" stroke-linecap="round">
        <path d="M 8   188 L 18  158"/>
        <path d="M 24  188 L 34  160"/>
        <path d="M 42  188 L 52  158"/>
        <path d="M 60  188 L 70  162"/>
        <path d="M 80  188 L 90  158"/>
        <path d="M 98  188 L 108 162"/>
        <path d="M 118 188 L 128 158"/>
        <path d="M 138 188 L 148 162"/>
        <path d="M 158 188 L 168 158"/>
        <path d="M 178 188 L 188 162"/>
        <path d="M 198 188 L 208 158"/>
        <path d="M 218 188 L 228 162"/>
        <path d="M 238 188 L 248 158"/>
    </g>
</svg>
