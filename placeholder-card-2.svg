<?xml version="1.0" encoding="UTF-8"?>
<!-- UNDER THE STARLIT SKY · Gallery Card 2 — "Wanderer" -->
<svg xmlns="http://www.w3.org/2000/svg" width="260" height="195" viewBox="0 0 260 195" preserveAspectRatio="xMidYMid slice">

    <defs>
        <linearGradient id="c2Sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#0a1b30"/>
            <stop offset="55%"  stop-color="#142d44"/>
            <stop offset="100%" stop-color="#1f3a55"/>
        </linearGradient>
        <radialGradient id="c2Moon" cx="70%" cy="25%" r="18%">
            <stop offset="0%"   stop-color="#f0e3b8" stop-opacity="0.95"/>
            <stop offset="60%"  stop-color="#d4a058" stop-opacity="0.40"/>
            <stop offset="100%" stop-color="#a87838" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="260" height="195" fill="url(#c2Sky)"/>

    <!-- Stars -->
    <g fill="#f0e8d0">
        <circle cx="12" cy="20" r="1.0" opacity="0.85"/>
        <circle cx="42" cy="36" r="1.3" opacity="0.95"/>
        <circle cx="78" cy="14" r="0.9" opacity="0.80"/>
        <circle cx="118" cy="42" r="1.0" opacity="0.85"/>
        <circle cx="158" cy="22" r="1.4" opacity="0.95"/>
        <circle cx="200" cy="44" r="0.8" opacity="0.75"/>
        <circle cx="232" cy="20" r="1.2" opacity="0.90"/>
        <circle cx="30" cy="60" r="0.7" opacity="0.70"/>
        <circle cx="92" cy="68" r="1.0" opacity="0.85"/>
        <circle cx="142" cy="62" r="0.9" opacity="0.80"/>
    </g>

    <!-- Moon -->
    <circle cx="182" cy="48" r="22" fill="url(#c2Moon)"/>
    <circle cx="182" cy="48" r="14" fill="#f5e5b8" opacity="0.85"/>

    <!-- Distant mountain ridge -->
    <path d="M 0 120 L 40 100 L 80 115 L 140 95 L 200 110 L 260 100 L 260 195 L 0 195 Z"
          fill="#0c1f33" opacity="0.9"/>

    <!-- Lone wanderer — a single lion silhouette on the ridge -->
    <g fill="#0a1525" opacity="0.92">
        <!-- body -->
        <ellipse cx="80" cy="125" rx="20" ry="8"/>
        <!-- head -->
        <circle cx="65" cy="120" r="7"/>
        <!-- legs -->
        <rect x="62" y="130" width="2.5" height="10"/>
        <rect x="70" y="130" width="2.5" height="10"/>
        <rect x="88" y="130" width="2.5" height="10"/>
        <rect x="96" y="130" width="2.5" height="10"/>
        <!-- tail -->
        <path d="M 100 122 Q 110 120, 112 114 L 110 114 Q 105 119, 100 120 Z"/>
    </g>

    <!-- Small golden glow around the wanderer -->
    <ellipse cx="80" cy="125" rx="30" ry="10" fill="#e8c068" opacity="0.15"/>

    <!-- Subtle wind streaks in the sky -->
    <g stroke="#e8c068" stroke-width="0.8" fill="none" opacity="0.30" stroke-linecap="round">
        <path d="M 30 80 Q 60 76, 90 80"/>
        <path d="M 130 90 Q 160 86, 190 90"/>
    </g>

    <!-- Foreground grass strip -->
    <rect x="0" y="168" width="260" height="27"
          fill="#a87838" opacity="0.55"/>
</svg>
