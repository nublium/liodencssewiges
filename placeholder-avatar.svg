<?xml version="1.0" encoding="UTF-8"?>
<!-- UNDER THE STARLIT SKY · Player Avatar placeholder
     Non-circle (4:3 rectangle) night-sky + golden mane scene -->
<svg xmlns="http://www.w3.org/2000/svg" width="220" height="165" viewBox="0 0 220 165" preserveAspectRatio="xMidYMid slice">

    <defs>
        <linearGradient id="avSky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#0a1b30"/>
            <stop offset="55%"  stop-color="#142d44"/>
            <stop offset="100%" stop-color="#1a3855"/>
        </linearGradient>
        <radialGradient id="avMilky" cx="50%" cy="35%" r="60%">
            <stop offset="0%"  stop-color="#e8e0c0" stop-opacity="0.15"/>
            <stop offset="55%" stop-color="#c8d8e8" stop-opacity="0.05"/>
            <stop offset="100%" stop-color="#0a1b30" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="avGoldGlow" cx="55%" cy="68%" r="35%">
            <stop offset="0%"   stop-color="#ffd680" stop-opacity="0.75"/>
            <stop offset="50%"  stop-color="#d4a058" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#a87838" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="avGrass" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#a87838" stop-opacity="0"/>
            <stop offset="50%"  stop-color="#c89545" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#e8c068" stop-opacity="0.75"/>
        </linearGradient>
    </defs>

    <!-- Sky -->
    <rect width="220" height="165" fill="url(#avSky)"/>
    <rect width="220" height="165" fill="url(#avMilky)"/>

    <!-- Stars -->
    <g fill="#f0e8d0">
        <circle cx="18"  cy="14" r="1.2" opacity="0.95"/>
        <circle cx="36"  cy="28" r="0.9" opacity="0.75"/>
        <circle cx="54"  cy="12" r="1.4" opacity="0.95"/>
        <circle cx="72"  cy="34" r="0.8" opacity="0.85"/>
        <circle cx="92"  cy="20" r="1.1" opacity="0.90"/>
        <circle cx="112" cy="8"  r="0.9" opacity="0.80"/>
        <circle cx="132" cy="26" r="1.3" opacity="0.95"/>
        <circle cx="152" cy="14" r="0.8" opacity="0.85"/>
        <circle cx="172" cy="32" r="1.2" opacity="0.92"/>
        <circle cx="192" cy="18" r="1.0" opacity="0.88"/>
        <circle cx="208" cy="40" r="0.7" opacity="0.75"/>
        <circle cx="10"  cy="48" r="0.9" opacity="0.80"/>
        <circle cx="42"  cy="56" r="1.0" opacity="0.85"/>
        <circle cx="86"  cy="58" r="0.7" opacity="0.70"/>
    </g>

    <!-- Distant mountain horizon -->
    <path d="M 0 110 L 30 95 L 55 105 L 85 88 L 115 100 L 145 92 L 175 102 L 220 95 L 220 165 L 0 165 Z"
          fill="#0c1f33" opacity="0.9"/>

    <!-- Gold-glow around where the lion stands -->
    <ellipse cx="120" cy="125" rx="80" ry="38" fill="url(#avGoldGlow)"/>

    <!-- Stylized lion silhouette with flowing mane -->
    <g fill="#0a1525" opacity="0.92">
        <!-- body -->
        <ellipse cx="110" cy="128" rx="32" ry="14"/>
        <!-- head -->
        <circle cx="92" cy="120" r="11"/>
        <!-- legs (front) -->
        <rect x="86" y="135" width="3" height="14" rx="1"/>
        <rect x="96" y="135" width="3" height="14" rx="1"/>
        <!-- legs (back) -->
        <rect x="124" y="135" width="3" height="14" rx="1"/>
        <rect x="134" y="135" width="3" height="14" rx="1"/>
        <!-- tail -->
        <path d="M 140 126 Q 158 122, 162 116 L 160 116 Q 154 122, 138 124 Z"/>
    </g>

    <!-- Golden flowing mane wisps -->
    <g fill="none" stroke-linecap="round">
        <path d="M 80 110 Q 70 108, 60 112 Q 52 116, 48 124"
              stroke="#e8c068" stroke-width="2.5" opacity="0.85"/>
        <path d="M 84 116 Q 72 118, 60 124 Q 50 130, 46 138"
              stroke="#ffd680" stroke-width="2" opacity="0.75"/>
        <path d="M 86 120 Q 76 124, 66 130 Q 56 134, 50 142"
              stroke="#d4a058" stroke-width="1.6" opacity="0.65"/>
        <path d="M 96 112 Q 88 106, 80 100"
              stroke="#ffd680" stroke-width="1.8" opacity="0.70"/>
    </g>

    <!-- Foreground grass strip -->
    <rect x="0" y="145" width="220" height="20" fill="url(#avGrass)"/>

    <!-- A few foreground grass blades -->
    <g stroke="#d4a058" stroke-width="1" fill="none" opacity="0.65">
        <line x1="20"  y1="160" x2="22"  y2="148"/>
        <line x1="40"  y1="161" x2="38"  y2="150"/>
        <line x1="68"  y1="158" x2="70"  y2="148"/>
        <line x1="98"  y1="160" x2="96"  y2="148"/>
        <line x1="128" y1="158" x2="130" y2="148"/>
        <line x1="158" y1="160" x2="156" y2="150"/>
        <line x1="188" y1="158" x2="190" y2="148"/>
    </g>

    <!-- Corner accent dots -->
    <circle cx="6"   cy="6"   r="1.5" fill="#e8c068" opacity="0.65"/>
    <circle cx="214" cy="6"   r="1.5" fill="#e8c068" opacity="0.65"/>
    <circle cx="6"   cy="159" r="1.5" fill="#e8c068" opacity="0.65"/>
    <circle cx="214" cy="159" r="1.5" fill="#e8c068" opacity="0.65"/>
</svg>
