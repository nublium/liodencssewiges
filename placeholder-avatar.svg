<?xml version="1.0" encoding="UTF-8"?>
<!-- UNDER THE STARLIT SKY · Player Avatar placeholder
     LANDSCAPE ONLY · no animals · 4:3 rectangle -->
<svg xmlns="http://www.w3.org/2000/svg" width="220" height="165" viewBox="0 0 220 165" preserveAspectRatio="xMidYMid slice">

    <defs>
        <linearGradient id="avSky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#0a1b30"/>
            <stop offset="55%"  stop-color="#142d44"/>
            <stop offset="100%" stop-color="#1a3855"/>
        </linearGradient>
        <radialGradient id="avMilky" cx="50%" cy="30%" r="65%">
            <stop offset="0%"  stop-color="#c8d8e8" stop-opacity="0.20"/>
            <stop offset="55%" stop-color="#a8b8d0" stop-opacity="0.07"/>
            <stop offset="100%" stop-color="#0a1b30" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="avMoonGlow" cx="78%" cy="22%" r="20%">
            <stop offset="0%"   stop-color="#fff5e0" stop-opacity="0.55"/>
            <stop offset="60%"  stop-color="#e8c068" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#a87838" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="avGrass" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#8c6428" stop-opacity="0.10"/>
            <stop offset="60%"  stop-color="#a87838" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#e8c068" stop-opacity="0.85"/>
        </linearGradient>
    </defs>

    <!-- Layered sky -->
    <rect width="220" height="165" fill="url(#avSky)"/>
    <rect width="220" height="165" fill="url(#avMilky)"/>

    <!-- Moon -->
    <circle cx="172" cy="36" r="14" fill="url(#avMoonGlow)"/>
    <circle cx="172" cy="36" r="8"  fill="#fff5e0" opacity="0.85"/>

    <!-- Stars (more, denser than before) -->
    <g fill="#f0e8d0">
        <circle cx="12"  cy="14" r="1.2" opacity="0.95"/>
        <circle cx="28"  cy="26" r="0.7" opacity="0.70"/>
        <circle cx="44"  cy="12" r="1.4" opacity="0.95"/>
        <circle cx="62"  cy="30" r="0.8" opacity="0.80"/>
        <circle cx="80"  cy="18" r="1.0" opacity="0.85"/>
        <circle cx="96"  cy="32" r="0.9" opacity="0.80"/>
        <circle cx="116" cy="14" r="1.2" opacity="0.95"/>
        <circle cx="134" cy="28" r="0.7" opacity="0.70"/>
        <circle cx="148" cy="12" r="1.3" opacity="0.92"/>
        <circle cx="194" cy="22" r="0.9" opacity="0.80"/>
        <circle cx="208" cy="40" r="0.7" opacity="0.70"/>
        <circle cx="8"   cy="48" r="0.8" opacity="0.75"/>
        <circle cx="34"  cy="58" r="1.0" opacity="0.85"/>
        <circle cx="68"  cy="54" r="0.7" opacity="0.70"/>
        <circle cx="100" cy="62" r="0.9" opacity="0.80"/>
        <circle cx="134" cy="56" r="0.7" opacity="0.70"/>
        <circle cx="164" cy="64" r="0.8" opacity="0.75"/>
        <circle cx="196" cy="58" r="0.7" opacity="0.70"/>
    </g>

    <!-- Distant mountain horizon -->
    <path d="M 0 100 L 18 88 L 38 95 L 60 80 L 88 92 L 112 78 L 138 90 L 162 82 L 188 94 L 220 86 L 220 165 L 0 165 Z"
          fill="#0c1f33" opacity="0.95"/>

    <!-- Mid hills -->
    <path d="M 0 118 Q 50 108, 110 120 Q 170 110, 220 118 L 220 165 L 0 165 Z"
          fill="#1a2535" opacity="0.92"/>

    <!-- Foreground golden grass field -->
    <rect x="0" y="128" width="220" height="37" fill="url(#avGrass)"/>

    <!-- Wind-swept grass blades (all leaning in same direction) -->
    <g stroke="#d4a058" stroke-width="1" fill="none" opacity="0.78" stroke-linecap="round">
        <path d="M 10  160 L 14  140"/>
        <path d="M 24  162 L 28  142"/>
        <path d="M 38  160 L 42  140"/>
        <path d="M 54  162 L 58  142"/>
        <path d="M 70  160 L 74  140"/>
        <path d="M 86  162 L 90  142"/>
        <path d="M 102 160 L 106 140"/>
        <path d="M 118 162 L 122 142"/>
        <path d="M 134 160 L 138 140"/>
        <path d="M 150 162 L 154 142"/>
        <path d="M 166 160 L 170 140"/>
        <path d="M 182 162 L 186 142"/>
        <path d="M 198 160 L 202 140"/>
        <path d="M 212 162 L 216 142"/>
    </g>

    <!-- A few floating sparks above the grass -->
    <g fill="#ffd680">
        <circle cx="40"  cy="125" r="1.0" opacity="0.85"/>
        <circle cx="92"  cy="118" r="1.2" opacity="0.90"/>
        <circle cx="156" cy="122" r="0.9" opacity="0.80"/>
        <circle cx="200" cy="115" r="1.1" opacity="0.85"/>
    </g>
</svg>
