<?xml version="1.0" encoding="UTF-8"?>
<!-- UNDER THE STARLIT SKY · beetle-mound thumbnail
     LANDSCAPE ONLY · rocky outcrop on a hill, no animals -->
<svg xmlns="http://www.w3.org/2000/svg" width="260" height="170" viewBox="0 0 260 170" preserveAspectRatio="xMidYMid slice">

    <defs>
        <linearGradient id="mdSky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#0a1b30"/>
            <stop offset="60%"  stop-color="#142d44"/>
            <stop offset="100%" stop-color="#1f3a55"/>
        </linearGradient>
        <linearGradient id="mdFrame" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"  stop-color="#a87838"/>
            <stop offset="60%" stop-color="#d4a058"/>
            <stop offset="100%" stop-color="#e8c068"/>
        </linearGradient>
        <radialGradient id="mdGlow" cx="50%" cy="80%" r="40%">
            <stop offset="0%"   stop-color="#ffd680" stop-opacity="0.45"/>
            <stop offset="60%"  stop-color="#d4a058" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#a87838" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="260" height="170" fill="url(#mdSky)"/>

    <rect x="2" y="2" width="256" height="166" fill="none"
          stroke="url(#mdFrame)" stroke-width="1.5" opacity="0.70"/>

    <!-- Dense stars -->
    <g fill="#f0e8d0">
        <circle cx="12"  cy="14" r="1.0" opacity="0.85"/>
        <circle cx="36"  cy="22" r="1.2" opacity="0.92"/>
        <circle cx="58"  cy="12" r="0.9" opacity="0.78"/>
        <circle cx="82"  cy="28" r="1.0" opacity="0.85"/>
        <circle cx="106" cy="16" r="1.4" opacity="0.95"/>
        <circle cx="130" cy="26" r="0.7" opacity="0.70"/>
        <circle cx="156" cy="12" r="1.2" opacity="0.90"/>
        <circle cx="180" cy="24" r="0.9" opacity="0.80"/>
        <circle cx="204" cy="14" r="1.1" opacity="0.88"/>
        <circle cx="228" cy="28" r="0.8" opacity="0.75"/>
        <circle cx="248" cy="16" r="1.0" opacity="0.85"/>
        <circle cx="22"  cy="46" r="0.7" opacity="0.65"/>
        <circle cx="64"  cy="52" r="0.8" opacity="0.72"/>
        <circle cx="142" cy="48" r="0.9" opacity="0.78"/>
        <circle cx="208" cy="50" r="0.7" opacity="0.65"/>
    </g>

    <!-- Distant ridge -->
    <path d="M 0 95 L 40 80 L 80 92 L 130 76 L 180 90 L 220 82 L 260 88 L 260 110 L 0 110 Z"
          fill="#0c1f33" opacity="0.92"/>

    <!-- Glow around the rocky hill -->
    <ellipse cx="130" cy="125" rx="90" ry="32" fill="url(#mdGlow)"/>

    <!-- Mid hills -->
    <path d="M 0 116 Q 70 105, 130 118 Q 200 108, 260 118 L 260 138 L 0 138 Z"
          fill="#1a2535" opacity="0.90"/>

    <!-- The rocky outcrop / hill where the mound used to be -->
    <path d="M 80 138 Q 100 100, 130 90 Q 160 100, 180 138 Z"
          fill="#2a3548" opacity="0.95"/>
    <path d="M 90 134 Q 110 105, 130 96 Q 150 105, 170 134"
          stroke="#a87838" stroke-width="1" fill="none" opacity="0.45"/>
    <!-- A few stones for texture -->
    <ellipse cx="108" cy="128" rx="6" ry="3" fill="#3a4558" opacity="0.85"/>
    <ellipse cx="148" cy="124" rx="7" ry="3.5" fill="#3a4558" opacity="0.85"/>
    <ellipse cx="130" cy="118" rx="5" ry="2.5" fill="#3a4558" opacity="0.85"/>

    <!-- Glowing sparks on the hill (no longer beetles — abstract sparks) -->
    <g fill="#ffd680">
        <circle cx="108" cy="120" r="1.2" opacity="0.90"/>
        <circle cx="130" cy="108" r="1.6" opacity="0.95"/>
        <circle cx="150" cy="114" r="1.3" opacity="0.92"/>
        <circle cx="120" cy="124" r="1.0" opacity="0.85"/>
        <circle cx="140" cy="122" r="1.1" opacity="0.88"/>
    </g>

    <!-- Foreground grass strip -->
    <rect x="0" y="138" width="260" height="32" fill="#8c6428" opacity="0.45"/>
    <g stroke="#d4a058" stroke-width="1" fill="none" opacity="0.65" stroke-linecap="round">
        <line x1="20"  y1="160" x2="22"  y2="146"/>
        <line x1="48"  y1="162" x2="46"  y2="146"/>
        <line x1="78"  y1="160" x2="80"  y2="146"/>
        <line x1="208" y1="160" x2="206" y2="146"/>
        <line x1="238" y1="162" x2="240" y2="146"/>
    </g>
</svg>
