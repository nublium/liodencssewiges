<?xml version="1.0" encoding="UTF-8"?>
<!-- UNDER THE STARLIT SKY · beetle-mound thumbnail — golden mound under stars -->
<svg xmlns="http://www.w3.org/2000/svg" width="260" height="170" viewBox="0 0 260 170" preserveAspectRatio="xMidYMid slice">

    <defs>
        <linearGradient id="mdSky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#0a1b30"/>
            <stop offset="60%"  stop-color="#142d44"/>
            <stop offset="100%" stop-color="#1f3a55"/>
        </linearGradient>
        <linearGradient id="mdFrame" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"  stop-color="#a87838"/>
            <stop offset="60%" stop-color="#d4a058"/>
            <stop offset="100%" stop-color="#e8c068"/>
        </linearGradient>
        <radialGradient id="mdMoundGlow" cx="50%" cy="80%" r="40%">
            <stop offset="0%"   stop-color="#ffd680" stop-opacity="0.55"/>
            <stop offset="60%"  stop-color="#d4a058" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#a87838" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="260" height="170" fill="url(#mdSky)"/>

    <rect x="2" y="2" width="256" height="166" fill="none"
          stroke="url(#mdFrame)" stroke-width="1.5" opacity="0.70"/>

    <!-- Stars -->
    <g fill="#f0e8d0">
        <circle cx="22"  cy="18" r="1.2" opacity="0.90"/>
        <circle cx="58"  cy="32" r="0.8" opacity="0.75"/>
        <circle cx="98"  cy="14" r="1.4" opacity="0.95"/>
        <circle cx="138" cy="28" r="0.9" opacity="0.80"/>
        <circle cx="178" cy="14" r="1.3" opacity="0.92"/>
        <circle cx="218" cy="30" r="0.9" opacity="0.80"/>
        <circle cx="36"  cy="52" r="0.7" opacity="0.68"/>
        <circle cx="208" cy="48" r="0.8" opacity="0.72"/>
    </g>

    <!-- Glow around the mound -->
    <ellipse cx="130" cy="130" rx="90" ry="34" fill="url(#mdMoundGlow)"/>

    <!-- The beetle mound -->
    <path d="M 70 130 Q 130 80, 190 130 Z" fill="#3a2818" opacity="0.92"/>
    <path d="M 78 128 Q 130 92, 182 128" stroke="#a87838" stroke-width="1.5"
          fill="none" opacity="0.55"/>

    <!-- Glowing beetles on the mound -->
    <g>
        <ellipse cx="105" cy="118" rx="3" ry="2" fill="#ffd680" opacity="0.95"/>
        <ellipse cx="130" cy="100" rx="3.5" ry="2.3" fill="#e8c068" opacity="0.95"/>
        <ellipse cx="155" cy="115" rx="3" ry="2" fill="#ffd680" opacity="0.95"/>
        <ellipse cx="120" cy="125" rx="2.5" ry="1.8" fill="#d4a058" opacity="0.85"/>
        <ellipse cx="142" cy="122" rx="2.8" ry="2" fill="#ffd680" opacity="0.95"/>
    </g>

    <!-- Foreground ground line -->
    <rect x="0" y="130" width="260" height="40" fill="#8c6428" opacity="0.45"/>

    <!-- Some grass -->
    <g stroke="#d4a058" stroke-width="1" fill="none" opacity="0.65" stroke-linecap="round">
        <line x1="20" y1="158" x2="22" y2="142"/>
        <line x1="45" y1="160" x2="43" y2="144"/>
        <line x1="220" y1="160" x2="222" y2="144"/>
        <line x1="240" y1="158" x2="238" y2="142"/>
    </g>
</svg>
